services:
  - type: web
    name: sms-backend
    runtime: go
    buildCommand: cd sms-backend && go build -o main .
    startCommand: cd sms-backend && ./main
    envVars:
      - key: ENV
        value: production
      - key: SKIP_MIGRATE
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_SSE_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://school-management-system.vercel.app
      - key: CORS_ORIGINS
        value: https://school-management-system.vercel.app
      - key: PORT
        value: 8080
    healthCheck:
      path: /health
      interval: 30s
      timeout: 10s
      restartDelay: 5s

databases:
  - name: sms-db
    plan: free