services:
  - type: web
    name: sms-backend
    runtime: go
    buildCommand: cd sms-backend && go build -o main .
    startCommand: cd sms-backend && ./main
    envVars:
      - key: ENV
        value: production
      - key: SKIP_MIGRATE
        value: "false"
      # DATABASE_URL is managed manually in the Render dashboard.
      # Set it to your Supabase SESSION-pooler URL (port 5432), e.g.:
      # postgresql://postgres.YOURREF:PASSWORD@aws-0-eu-west-1.pooler.supabase.com:5432/postgres
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_SSE_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://school-management-system-jade-xi.vercel.app
      - key: PORT
        value: 8080
    healthCheck:
      path: /health
      interval: 30s
      timeout: 10s
      restartDelay: 5s
