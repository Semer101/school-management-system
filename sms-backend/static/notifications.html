<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notifications — SMS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f2f5;
    --panel: #ffffff;
    --border: #e4e6eb;
    --text: #050505;
    --text2: #65676b;
    --text3: #b0b3b8;
    --primary: #1877f2;
    --primary-light: #e7f0ff;
    --unread-dot: #1877f2;
    --bubble-unread: #ffffff;
    --bubble-read: #f7f8fa;
    --bubble-border-unread: #1877f2;
    --bubble-border-read: #e4e6eb;
    --badge: #fa3e3e;
    --header-h: 56px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px;
  }
  header h1 { font-size: 18px; font-weight: 700; flex: 1; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .conn-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #ccc; transition: background 0.3s;
  }
  .conn-dot.live { background: #31a24c; }
  .conn-label { font-size: 12px; color: var(--text2); }
  .unread-badge {
    background: var(--badge); color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 2px 7px; border-radius: 10px;
    display: none;
  }
  .mark-all-btn {
    padding: 5px 14px; font-size: 12px; font-weight: 600;
    background: var(--primary-light); color: var(--primary);
    border: 1px solid var(--primary); border-radius: 6px; cursor: pointer;
  }
  .mark-all-btn:hover { background: var(--primary); color: #fff; }

  /* Auth gate — shown only when no valid session cookie exists */
  #auth-gate {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .auth-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 32px 28px; width: 340px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  .auth-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .auth-card p  { color: var(--text2); font-size: 13px; margin-bottom: 20px; }
  .auth-card input {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px;
    margin-bottom: 12px; outline: none;
  }
  .auth-card input:focus { border-color: var(--primary); }
  .auth-card button {
    width: 100%; padding: 9px; background: var(--primary); color: #fff;
    border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .auth-card button:hover { opacity: .9; }
  .auth-error { color: #dc3545; font-size: 12px; margin-top: 8px; display: none; }
  .auth-note { font-size: 11px; color: var(--text3); margin-top: 10px; }

  main {
    max-width: 680px; margin: 0 auto;
    padding: calc(var(--header-h) + 20px) 16px 40px;
  }

  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 5px 14px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); border-radius: 20px;
    background: var(--panel); color: var(--text2); cursor: pointer;
  }
  .filter-btn.active {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }

  #empty {
    text-align: center; padding: 60px 0; color: var(--text2);
    display: none;
  }
  #empty svg { opacity: .3; margin-bottom: 12px; }
  #empty p { font-size: 15px; }

  #feed { display: flex; flex-direction: column; gap: 10px; }

  .notif-bubble {
    background: var(--bubble-unread);
    border: 1.5px solid var(--bubble-border-unread);
    border-radius: 12px;
    padding: 14px 16px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 4px rgba(24,119,242,.10);
  }
  .notif-bubble.read {
    background: var(--bubble-read);
    border-color: var(--bubble-border-read);
    box-shadow: none;
  }
  .notif-bubble:hover { box-shadow: 0 2px 8px rgba(0,0,0,.10); }

  .notif-bubble::before {
    content: '';
    position: absolute; top: 18px; right: 16px;
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--unread-dot);
    transition: opacity 0.2s;
  }
  .notif-bubble.read::before { opacity: 0; }

  .notif-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }
  .notif-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--primary-light); color: var(--primary);
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .notif-sender { font-size: 13px; font-weight: 700; }
  .notif-time   { font-size: 11px; color: var(--text3); margin-left: auto; padding-right: 18px; }

  .notif-title {
    font-size: 14px; font-weight: 600; margin-bottom: 4px;
    color: var(--text);
  }
  .notif-body {
    font-size: 13px; color: var(--text2); white-space: pre-wrap; word-break: break-word;
  }

  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #fff;
    padding: 10px 20px; border-radius: 8px; font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    z-index: 300;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!--
  Auth gate — shown only if the browser has no active access token.

  The page no longer stores or uses a JWT in JavaScript variables.
  All API calls use credentials:'include' so the browser automatically
  sends the sms_refresh HttpOnly cookie when needed. The access token
  is stored only in memory (JS variable) and obtained either:
    (a) automatically via POST /api/token/refresh (using the cookie), or
    (b) manually by the user pasting it once (for non-browser environments).

  The SSE stream uses a short-lived sse_token (60s) obtained from
  POST /api/notifications/sse-token — the full access JWT is never
  placed in a URL where it would be logged.
-->
<div id="auth-gate">
  <div class="auth-card">
    <h2>📬 Notifications</h2>
    <p id="auth-subtext">Checking your session…</p>
    <div id="manual-login" style="display:none">
      <input type="password" id="token-input" placeholder="Paste your access token" autocomplete="off" />
      <button onclick="loginWithToken()">Continue</button>
    </div>
    <div class="auth-error" id="auth-error">Invalid token — please try again.</div>
    <p class="auth-note" id="auth-note" style="display:none">
      Your session is secured via HttpOnly cookie. The token is never stored in localStorage.
    </p>
  </div>
</div>

<header>
  <h1>📬 Notifications</h1>
  <div class="header-right">
    <span class="conn-dot" id="conn-dot"></span>
    <span class="conn-label" id="conn-label">Connecting…</span>
    <span class="unread-badge" id="unread-badge">0</span>
    <button class="mark-all-btn" onclick="markAllRead()">Mark all read</button>
  </div>
</header>

<main>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',    this)">All</button>
    <button class="filter-btn"        onclick="setFilter('unread', this)">Unread</button>
    <button class="filter-btn"        onclick="setFilter('read',   this)">Read</button>
  </div>

  <div id="empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <p>No notifications yet</p>
  </div>

  <div id="feed"></div>
</main>

<div id="toast"></div>

<script>
const BASE = 'http://localhost:8080';

// In-memory only — never written to localStorage or sessionStorage.
// the full JWT is not passed in URLs; the SSE stream gets a short-lived sse_token.
let accessToken = '';
let currentFilter = 'all';
const notifMap = {};

// ── Bootstrap ─────────────────────────────────────────────────────────────────
// On page load, try to silently refresh using the HttpOnly sms_refresh cookie.
// If that fails (not logged in / cookie expired), show the manual login form.
(async function bootstrap() {
  try {
    const ok = await silentRefresh();
    if (ok) {
      hideGate();
      init();
    } else {
      showManualLogin('Enter your access token to continue.');
    }
  } catch {
    showManualLogin('Enter your access token to continue.');
  }
})();

// ── Silent refresh via HttpOnly cookie ────────────────────────────────────────
// POST /api/token/refresh with credentials:'include' sends the sms_refresh
// HttpOnly cookie automatically. The new access token is stored in memory only.
async function silentRefresh() {
  try {
    const res = await fetch(`${BASE}/api/token/refresh`, {
      method: 'POST',
      credentials: 'include',   // sends sms_refresh cookie
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})   // empty body — server prefers cookie
    });
    if (!res.ok) return false;
    const json = await res.json();
    if (json.data && json.data.access_token) {
      accessToken = json.data.access_token;
      return true;
    }
    return false;
  } catch {
    return false;
  }
}

// ── Manual login (fallback for non-browser / no cookie) ───────────────────────
function showManualLogin(msg) {
  document.getElementById('auth-subtext').textContent = msg;
  document.getElementById('manual-login').style.display = '';
  document.getElementById('auth-note').style.display = '';
}

async function loginWithToken() {
  let raw = document.getElementById('token-input').value.trim();
  if (raw.toLowerCase().startsWith('bearer ')) raw = raw.slice(7).trim();
  if (!raw) return;

  try {
    const res = await fetch(`${BASE}/api/me`, {
      headers: { Authorization: 'Bearer ' + raw }
    });
    if (!res.ok) throw new Error('unauthorized');
    accessToken = raw;
    hideGate();
    init();
  } catch {
    document.getElementById('auth-error').style.display = 'block';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('manual-login').style.display !== 'none') {
    loginWithToken();
  }
});

function hideGate() {
  document.getElementById('auth-gate').style.display = 'none';
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadHistory();
  connectSSE();
}

// ── Load history ──────────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(`${BASE}/api/notifications`, {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (res.status === 401) { await handleTokenExpiry(); return; }
    const json = await res.json();
    if (json.data && Array.isArray(json.data)) {
      json.data.forEach(n => addBubble(n, false));
    }
    updateUnreadBadge();
    checkEmpty();
  } catch (err) {
    showToast('Failed to load notifications');
  }
}

// ── SSE — uses a 60-second sse_token, NOT the full access JWT ─────────────────
// The full access JWT must never appear in a URL (logged by every proxy).
// We obtain a short-lived token from /api/notifications/sse-token and use that.
async function connectSSE() {
  let sseToken;
  try {
    const res = await fetch(`${BASE}/api/notifications/sse-token`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (res.status === 401) { await handleTokenExpiry(); return; }
    const json = await res.json();
    sseToken = json.data && json.data.sse_token;
  } catch {
    showToast('Could not obtain SSE token — live updates unavailable');
    return;
  }

  if (!sseToken) return;

  // Only the 60-second sse_token goes in the URL.
  const es = new EventSource(`${BASE}/api/notifications/stream?sse_token=${encodeURIComponent(sseToken)}`);

  es.addEventListener('notification', e => {
    const data = JSON.parse(e.data);
    const notif = {
      receipt_id:  null,
      id:          data.id,
      title:       data.title,
      body:        data.body,
      sender_name: data.sender_name || 'Admin',
      is_read:     false,
      received_at: data.created_at,
    };
    addBubble(notif, true);
    updateUnreadBadge();
    checkEmpty();
    showToast('📬 ' + notif.title);
  });

  es.onopen = () => {
    document.getElementById('conn-dot').classList.add('live');
    document.getElementById('conn-label').textContent = 'Live';
  };

  es.onerror = () => {
    document.getElementById('conn-dot').classList.remove('live');
    document.getElementById('conn-label').textContent = 'Reconnecting…';
    es.close();
    // Re-obtain a fresh sse_token and reconnect after a short delay.
    setTimeout(connectSSE, 5000);
  };
}

// ── Handle expired access token ────────────────────────────────────────────────
async function handleTokenExpiry() {
  const refreshed = await silentRefresh();
  if (refreshed) {
    // Retry with the new token
    await loadHistory();
    connectSSE();
  } else {
    showToast('Session expired — please log in again');
    document.getElementById('auth-gate').style.display = 'flex';
  }
}

// ── Render a bubble ───────────────────────────────────────────────────────────
function addBubble(notif, prepend) {
  const feed = document.getElementById('feed');

  const div = document.createElement('div');
  div.className = 'notif-bubble' + (notif.is_read ? ' read' : '');
  div.dataset.receiptId = notif.receipt_id || '';
  div.dataset.read = notif.is_read ? '1' : '0';

  const initials = (notif.sender_name || 'A')
    .split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

  div.innerHTML = `
    <div class="notif-meta">
      <div class="notif-avatar">${initials}</div>
      <span class="notif-sender">${escHtml(notif.sender_name || 'Admin')}</span>
      <span class="notif-time">${formatTime(notif.received_at)}</span>
    </div>
    <div class="notif-title">${escHtml(notif.title)}</div>
    <div class="notif-body">${escHtml(notif.body)}</div>
  `;

  div.addEventListener('click', () => markRead(notif.receipt_id, div));

  if (prepend) feed.prepend(div); else feed.appendChild(div);
  if (notif.receipt_id) notifMap[notif.receipt_id] = { data: notif, el: div };
  applyFilter(div);
}

// ── Mark single as read ───────────────────────────────────────────────────────
async function markRead(receiptId, el) {
  if (!receiptId || el.dataset.read === '1') return;
  try {
    const res = await fetch(`${BASE}/api/notifications/${receiptId}/read`, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (res.status === 401) { await handleTokenExpiry(); return; }
    el.classList.add('read');
    el.dataset.read = '1';
    updateUnreadBadge();
    applyFilter(el);
  } catch {
    showToast('Could not mark as read');
  }
}

// ── Mark all read ─────────────────────────────────────────────────────────────
async function markAllRead() {
  const unread = document.querySelectorAll('.notif-bubble:not(.read)');
  for (const el of unread) {
    const rid = el.dataset.receiptId;
    if (rid) await markRead(rid, el);
  }
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.notif-bubble').forEach(applyFilter);
  checkEmpty();
}

function applyFilter(el) {
  const isRead = el.dataset.read === '1';
  let show = true;
  if (currentFilter === 'unread') show = !isRead;
  if (currentFilter === 'read')   show = isRead;
  el.style.display = show ? '' : 'none';
}

// ── Unread badge ──────────────────────────────────────────────────────────────
function updateUnreadBadge() {
  const count = document.querySelectorAll('.notif-bubble:not(.read)').length;
  const badge = document.getElementById('unread-badge');
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline-block' : 'none';
}

// ── Empty state ───────────────────────────────────────────────────────────────
function checkEmpty() {
  const visible = [...document.querySelectorAll('.notif-bubble')]
    .filter(el => el.style.display !== 'none');
  document.getElementById('empty').style.display = visible.length === 0 ? 'block' : 'none';
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatTime(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
</script>
</body>
</html>
