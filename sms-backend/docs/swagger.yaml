basePath: /
definitions:
  controllers.AttendanceInput:
    properties:
      date:
        example: "2025-05-01"
        type: string
      notes:
        example: Arrived 5 mins late
        type: string
      status:
        enum:
        - Present
        - Absent
        - Late
        example: Present
        type: string
      student_id:
        example: 1
        type: integer
      subject_id:
        example: 2
        type: integer
    required:
    - date
    - status
    - student_id
    - subject_id
    type: object
  controllers.BroadcastInput:
    properties:
      body:
        example: Please collect report cards by Friday.
        minLength: 10
        type: string
      roles:
        example:
        - '["Student"'
        - '"Parent"]'
        items:
          type: string
        type: array
      title:
        example: End of Term Reminder
        minLength: 5
        type: string
    required:
    - body
    - title
    type: object
  controllers.BulkGradeInput:
    properties:
      academic_year:
        example: 2025
        type: integer
      grades:
        items:
          $ref: '#/definitions/controllers.GradeEntry'
        minItems: 1
        type: array
      max_score:
        example: 100
        minimum: 1
        type: number
      subject_id:
        example: 3
        type: integer
      term:
        enum:
        - Term1
        - Term2
        - Term3
        example: Term1
        type: string
      type:
        enum:
        - Midterm
        - Final
        - Quiz
        - Assignment
        example: Midterm
        type: string
    required:
    - academic_year
    - grades
    - max_score
    - subject_id
    - term
    - type
    type: object
  controllers.ChangePasswordInput:
    properties:
      current_password:
        example: oldpass123
        type: string
      new_password:
        example: newpass456
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  controllers.CreateClassInput:
    properties:
      name:
        example: Grade 10A
        type: string
      teacher_id:
        example: 1
        type: integer
      year:
        example: 2025
        type: integer
    required:
    - name
    - year
    type: object
  controllers.CreatePayrollRequest:
    properties:
      amount:
        example: 15000
        minimum: 1
        type: number
      month:
        example: 5
        maximum: 12
        minimum: 1
        type: integer
      teacher_id:
        example: 2
        type: integer
      year:
        example: 2025
        maximum: 2100
        minimum: 2000
        type: integer
    required:
    - amount
    - month
    - teacher_id
    - year
    type: object
  controllers.CreateStudentInput:
    properties:
      class_id:
        example: 1
        type: integer
      date_of_birth:
        example: "2010-05-15"
        type: string
      email:
        example: alice@school.com
        type: string
      name:
        example: Alice Bekele
        minLength: 2
        type: string
      parent_email:
        example: parent@email.com
        type: string
      parent_id:
        example: 5
        type: integer
      parent_name:
        example: Mr. Bekele
        type: string
      parent_phone:
        example: "+251911000000"
        type: string
      password:
        example: password123
        minLength: 8
        type: string
      student_code:
        example: STU-001
        type: string
    required:
    - email
    - name
    - parent_id
    - password
    - student_code
    type: object
  controllers.CreateSubjectInput:
    properties:
      code:
        example: MATH-101
        type: string
      name:
        example: Mathematics
        type: string
      teacher_id:
        example: 1
        type: integer
    required:
    - code
    - name
    type: object
  controllers.CreateTeacherInput:
    properties:
      email:
        example: tadesse@school.com
        type: string
      name:
        example: Mr. Tadesse
        minLength: 2
        type: string
      password:
        example: teacher123
        minLength: 8
        type: string
      qualification:
        example: MSc Mathematics
        type: string
      teacher_code:
        example: TCH-001
        type: string
    required:
    - email
    - name
    - password
    - teacher_code
    type: object
  controllers.EnrollStudentInput:
    properties:
      student_id:
        example: 1
        type: integer
      subject_id:
        example: 2
        type: integer
    required:
    - student_id
    - subject_id
    type: object
  controllers.GradeEntry:
    properties:
      remarks:
        example: Good improvement
        type: string
      score:
        example: 87.5
        maximum: 100
        minimum: 0
        type: number
      student_id:
        example: 1
        type: integer
    required:
    - score
    - student_id
    type: object
  controllers.LoginInput:
    properties:
      email:
        example: john@school.com
        type: string
      password:
        example: secret123
        type: string
    required:
    - email
    - password
    type: object
  controllers.NotifyAbsencesInput:
    properties:
      date:
        example: "2025-05-01"
        type: string
    type: object
  controllers.RefreshTokenInput:
    properties:
      refresh_token:
        example: eyJhbGci...
        type: string
    required:
    - refresh_token
    type: object
  controllers.RegisterInput:
    properties:
      email:
        example: john@school.com
        type: string
      name:
        example: John Doe
        maxLength: 100
        minLength: 2
        type: string
      password:
        example: secret123
        minLength: 8
        type: string
      role:
        description: 'Valid roles: Admin, Teacher, Student, Parent'
        enum:
        - Admin
        - Teacher
        - Student
        - Parent
        example: Student
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  controllers.SubmitReceiptRequest:
    properties:
      amount:
        example: 5000
        minimum: 1
        type: number
      description:
        example: Term 1 tuition fee
        type: string
      receipt_id:
        example: CBE-TXN-20250501-001
        maxLength: 50
        minLength: 5
        type: string
      student_id:
        example: 1
        type: integer
    required:
    - amount
    - receipt_id
    - student_id
    type: object
  controllers.UnenrollStudentInput:
    properties:
      student_id:
        example: 1
        type: integer
      subject_id:
        example: 2
        type: integer
    required:
    - student_id
    - subject_id
    type: object
  controllers.UpdateClassInput:
    properties:
      name:
        example: Grade 10B
        type: string
      teacher_id:
        example: 2
        type: integer
      year:
        example: 2026
        type: integer
    type: object
  controllers.UpdateStudentInput:
    properties:
      class_id:
        example: 2
        type: integer
      date_of_birth:
        example: "2010-05-15"
        type: string
      parent_email:
        example: new@email.com
        type: string
      parent_id:
        example: 6
        type: integer
      parent_name:
        example: Mr. Updated
        type: string
      parent_phone:
        example: "+251922000000"
        type: string
    type: object
  controllers.UpdateSubjectInput:
    properties:
      code:
        example: MATH-201
        type: string
      name:
        example: Advanced Mathematics
        type: string
      teacher_id:
        example: 3
        type: integer
    type: object
  controllers.UpdateTeacherInput:
    properties:
      qualification:
        example: PhD Mathematics
        type: string
    required:
    - qualification
    type: object
  controllers.VerifyReceiptRequest:
    properties:
      remarks:
        example: Confirmed with bank
        type: string
      status:
        enum:
        - Verified
        - Rejected
        example: Verified
        type: string
    required:
    - status
    type: object
  helpers.APIResponse:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    School Management System — Go + Gin + PostgreSQL

    ## Authentication
    This API uses JWT Bearer tokens. Login via `POST /api/login` to receive an access token (1 hour) and a refresh token (7 days).
    Click the **Authorize** button above and enter: `Bearer <your_token>`

    ## Roles
    | Role    | Access                                              |
    |---------|-----------------------------------------------------|
    | Admin   | Full access to all endpoints                        |
    | Teacher | Attendance, grades, locker (read public)             |
    | Student | Own grades, report card, locker, finance             |
    | Parent  | Children's data, report cards, finance               |
  title: SMS Backend API
  version: "1.1"
paths:
  /api/academics/attendance:
    post:
      consumes:
      - application/json
      description: |-
        Records or updates attendance for a student in a subject on a given date.
        The teacher must be assigned to the subject being marked.
        FIX #3a: The student must be enrolled in the subject — phantom attendance records are now rejected.
      parameters:
      - description: Attendance data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.AttendanceInput'
      produces:
      - application/json
      responses:
        "200":
          description: Attendance updated (same-day override)
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "201":
          description: Attendance recorded
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Validation error or student not enrolled in subject
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "403":
          description: Forbidden — not your subject
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Record attendance (Teacher only)
      tags:
      - attendance
  /api/academics/attendance/{studentID}:
    get:
      description: |-
        Returns overall and per-subject attendance stats for a student.
        Accessible by: Teacher (any student), Student (own only), Admin, Parent (own child via ParentOwnsStudent middleware).
      parameters:
      - description: Student ID
        in: path
        name: studentID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Attendance summary
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "403":
          description: Forbidden — Students may only view their own attendance
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "404":
          description: Student profile not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get student attendance percentage
      tags:
      - attendance
  /api/academics/attendance/class/{classID}:
    get:
      parameters:
      - description: Class ID
        in: path
        name: classID
        required: true
        type: integer
      - description: Date in YYYY-MM-DD format
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Attendance records
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Missing or invalid date
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get class attendance for a date (Teacher only)
      tags:
      - attendance
  /api/academics/grades/bulk:
    post:
      consumes:
      - application/json
      description: |-
        Records grades for multiple students in one call. Uses upsert — if a grade for the same
        (student, subject, type, term, academic_year) already exists it is updated, not duplicated.
        FIX #2: The upsert requires a DB-level unique constraint on (student_id, subject_id, type, term, academic_year).
        Run migration.sql before deploying — without it the upsert silently creates duplicate rows.
        FIX #3b: Each student_id in the grades array is now validated to be enrolled in the subject.
      parameters:
      - description: Grade data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.BulkGradeInput'
      produces:
      - application/json
      responses:
        "201":
          description: Grades recorded
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Validation error or student not enrolled
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "403":
          description: Forbidden — not your subject
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Bulk grade entry (Teacher only)
      tags:
      - grades
  /api/academics/grades/student/{studentID}:
    get:
      description: |-
        Returns grades for a student filtered by term and/or academic year.
        Accessible by: Teacher, Student (own only), Admin, Parent (own child).
      parameters:
      - description: Student ID
        in: path
        name: studentID
        required: true
        type: integer
      - description: 'Term: Term1 | Term2 | Term3'
        in: query
        name: term
        type: string
      - description: Academic year e.g. 2025
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Grade list
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "403":
          description: Forbidden — Students may only view their own grades
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "404":
          description: Student profile not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get a student's grades
      tags:
      - grades
  /api/academics/grades/subject/{subjectID}:
    get:
      parameters:
      - description: Subject ID
        in: path
        name: subjectID
        required: true
        type: integer
      - description: 'Grade type: Midterm | Final | Quiz | Assignment'
        in: query
        name: type
        type: string
      - description: 'Term: Term1 | Term2 | Term3'
        in: query
        name: term
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Grade list
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get grades for a subject (Teacher only)
      tags:
      - grades
  /api/academics/reportcard/{studentID}:
    get:
      description: |-
        Returns a full report card with per-subject averages and letter grades.
        FIX: now requires academic_year query param (defaults to current year).
        Optionally filtered by term. Without these filters, cross-year averages were meaningless.
        Accessible by: Teacher, Student (own only), Admin, Parent (own child via ParentOwnsStudent middleware).
      parameters:
      - description: Student ID
        in: path
        name: studentID
        required: true
        type: integer
      - description: 'Academic year (default: current year)'
        in: query
        name: academic_year
        type: integer
      - description: 'Term filter: Term1 | Term2 | Term3 (omit for full year average)'
        in: query
        name: term
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Report card
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "403":
          description: Forbidden — Students may only view their own report card
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "404":
          description: Student not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get report card (JSON)
      tags:
      - report-card
  /api/academics/reportcard/{studentID}/pdf:
    get:
      description: Generates and streams a PDF report card. Accepts academic_year
        and term query params.
      parameters:
      - description: Student ID
        in: path
        name: studentID
        required: true
        type: integer
      - description: 'Academic year (default: current year)'
        in: query
        name: academic_year
        type: integer
      - description: 'Term filter: Term1 | Term2 | Term3'
        in: query
        name: term
        type: string
      produces:
      - application/pdf
      responses:
        "200":
          description: PDF download
          schema:
            type: file
        "403":
          description: Forbidden — Students may only download their own report card
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "404":
          description: Student not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "500":
          description: PDF generation failed
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Download report card as PDF
      tags:
      - report-card
  /api/admin/attendance/summary:
    get:
      description: |-
        FIX #5: SQL now uses NULLIF(COUNT, 0) and HAVING COUNT > 0 to prevent division-by-zero
        for students who have no attendance records at all.
      produces:
      - application/json
      responses:
        "200":
          description: Attendance summary
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: School-wide attendance summary (Admin only)
      tags:
      - attendance
  /api/admin/classes:
    get:
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 50, max 200)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of classes
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: List all classes (Admin only)
      tags:
      - classes
    post:
      consumes:
      - application/json
      parameters:
      - description: Class data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateClassInput'
      produces:
      - application/json
      responses:
        "201":
          description: Class created
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a class (Admin only)
      tags:
      - classes
  /api/admin/classes/{id}:
    delete:
      description: Blocked if any active students are still assigned to it.
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Class archived
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "404":
          description: Class not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "409":
          description: Class still has active students
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Archive (soft-delete) a class (Admin only)
      tags:
      - classes
    put:
      consumes:
      - application/json
      description: |-
        Updates the homeroom teacher, year, or name of a class.
        FIX: new endpoint — previously classes could only be created or archived.
      parameters:
      - description: Class ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.UpdateClassInput'
      produces:
      - application/json
      responses:
        "200":
          description: Class updated
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "404":
          description: Class not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Update a class (Admin only)
      tags:
      - classes
  /api/admin/enroll:
    post:
      consumes:
      - application/json
      parameters:
      - description: Enrollment data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.EnrollStudentInput'
      produces:
      - application/json
      responses:
        "201":
          description: Student enrolled
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Validation error, student not found, or subject not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "409":
          description: Already enrolled
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Enroll student in a subject (Admin only)
      tags:
      - enrollment
  /api/admin/finance/payroll:
    post:
      consumes:
      - application/json
      description: |-
        Creates a payroll record for a teacher for a specific month and year.
        FIX: Year is now validated with min=2000 — previously 0 or 1 were accepted.
      parameters:
      - description: Payroll data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.CreatePayrollRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Payroll created
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Validation error (including invalid year) or teacher not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "403":
          description: Forbidden — Admin only
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "409":
          description: Payroll already exists for this month/year
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a payroll entry (Admin only)
      tags:
      - finance
  /api/admin/finance/payroll/{id}/pay:
    patch:
      description: Sets a payroll record's status to Paid and records the payment
        timestamp.
      parameters:
      - description: Payroll ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Payroll updated
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Already paid
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "403":
          description: Forbidden — Admin only
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "404":
          description: Payroll not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Mark payroll as paid (Admin only)
      tags:
      - finance
  /api/admin/finance/receipt/{id}/verify:
    patch:
      consumes:
      - application/json
      description: |-
        Marks a pending receipt as Verified or Rejected. Can only be done once per receipt.
        FIX #6: Admin note is only appended to the description when remarks is non-empty.
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      - description: Verification data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controllers.VerifyReceiptRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Receipt processed
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Already processed or validation error
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "403":
          description: Forbidden — Admin only
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "404":
          description: Transaction not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Verify or reject a bank receipt (Admin only)
      tags:
      - finance
  /api/admin/finance/summary:
    get:
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 50, max 200)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
