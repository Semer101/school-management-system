          description: User not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /api/notifications:
    get:
      description: Returns all notifications targeted at the current user, most recent
        first.
      produces:
      - application/json
      responses:
        "200":
          description: Notification list
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get my notifications
      tags:
      - notifications
  /api/notifications/{id}/read:
    patch:
      description: Marks the notification receipt as read for the current user.
      parameters:
      - description: Receipt ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Marked as read
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "403":
          description: Forbidden — not your receipt
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "404":
          description: Receipt not found
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Mark a notification as read
      tags:
      - notifications
  /api/notifications/sse-token:
    post:
      description: |-
        Returns a 60-second token for use in the EventSource URL (?sse_token=...).
        This avoids passing the long-lived access JWT in the query string (which would appear in logs).
        The token is signed with a separate SSE secret and only valid for the /notifications/stream endpoint.
      produces:
      - application/json
      responses:
        "200":
          description: SSE token
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Issue a short-lived SSE token
      tags:
      - auth
  /api/notifications/stream:
    get:
      description: |-
        Opens a Server-Sent Events stream. Receives a "notification" event for every broadcast targeting the caller's role.
        FIX: This endpoint now uses SSEAuthMiddleware. Call POST /api/notifications/sse-token first to get a
        short-lived 60-second token, then connect with ?sse_token=<token>.
        The full access JWT must NOT be passed in the URL — it would be permanently logged by every proxy.
      parameters:
      - description: Short-lived SSE token (from POST /api/notifications/sse-token)
        in: query
        name: sse_token
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream open
          schema:
            type: string
        "401":
          description: Invalid or expired SSE token
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      summary: SSE stream for live notifications
      tags:
      - notifications
  /api/parent/children:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: List of children
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      security:
      - BearerAuth: []
      summary: Get parent's children (Parent only)
      tags:
      - parent
  /api/token/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Exchanges a valid refresh token for a new access token AND a new refresh token (rotation).
        The old refresh token is invalidated on use (prevents replay attacks).
        Token is read from the `sms_refresh` HttpOnly cookie (browser) or the JSON body (API clients).
        The new refresh token is returned in both the response body and a new cookie.
      parameters:
      - description: Refresh token (API clients only — browser uses cookie)
        in: body
        name: body
        schema:
          $ref: '#/definitions/controllers.RefreshTokenInput'
      produces:
      - application/json
      responses:
        "200":
          description: New tokens issued
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/helpers.APIResponse'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/helpers.APIResponse'
      summary: Refresh access token
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    description: 'Type "Bearer" followed by a space and your JWT token. Example: **Bearer
      eyJhbGci...**'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
